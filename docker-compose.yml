services:
  surrealdb:
    image: surrealdb/surrealdb:v2.0.4
    container_name: surrealdb
    restart: unless-stopped
    user: 'root'
    command: start --log debug rocksdb:/data/database.db
    ports:
      - 31313:8000
    volumes:
      - ./surrealdb/data:/data

  whistbook:
    container_name: whistbook
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 41414:43434
    restart: unless-stopped
    volumes:
      - ./data:/app/data
