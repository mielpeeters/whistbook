{%- import "scores.html" as scrs -%}
<div class="center-content">
  <div class="flex flex-col w-full h-full md:h-auto">
    <div class="flex items-center justify-between h-20 w-full">
      <div class="flex items-center gap-2">
        {% if game.deals.len() > 0 %}
        <div
          class="button center text-sm px-3 py-1"
          hx-post="/api/undo/{{id}}"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-confirm="Laatste ronde ongedaan maken?"
        >
          ↩
        </div>
        {% endif %}
      </div>
      <div class="flex items-center gap-2">
        <h2 class="font-medium text-xl text-neutral-800">
          {{ game.name }}
        </h2>
        <a
          hx-get="/game/{{id}}/settings"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-push-url="true"
          class="cursor-pointer text-neutral-500 hover:text-neutral-800"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
          </svg>
        </a>
      </div>
    </div>
    <div id="gameScores" class="{%- if game.players.len() > 4 -%} h-28 {%- else -%} h-20 {%- endif %} -mt-8">
      {% call scrs::scores(game.players, game.last_score(), "") %}
    </div>
    {% include "deal_form.html" %}
  </div>
</div>
